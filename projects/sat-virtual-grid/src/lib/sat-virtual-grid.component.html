<ng-scrollbar #sc track="all">

    <div #root [style.height.px]="maxHeight">
      <div #start class="start" [style.height.px]="data.startHeight"> </div>
      <div *ngFor="let grid of data.grids; trackBy: trackById"
        [id]="'sat-virtual-grid-' + grid.id"
        [style.grid-template-columns]="grid.columns | columnsPipe"
        class="table">

        <div *ngFor="let column of grid.columns; let i = index; trackBy: trackByIndex"
          class="column-width"  
          [column]="column"
          [columns]="grid.columns"
          [root]="getThis"
          [style.grid-column-start]="i + 1"
          dynamicWidth>
        </div>

        <div *ngIf="grid.addedSticky.height"
          [style.height.px]="grid.addedSticky.height"
          [style.grid-row-start]="grid.addedSticky.rowStart"
          [style.grid-row-end]="grid.addedSticky.rowStart">
        </div>

        {{getCells(grid)}}
      
        <div *ngFor="let cell of grid.itemsX; trackBy: trackById"
          [id]="cell.id"
          [dynamicHeight]="cell"
          [root]="getThis"
          [class]="cell.class || 'cell'"
          [style.grid-column-start]="cell.colStart ?? 1"
          [style.grid-column-end]="(cell.colStart ?? 1) + (cell.colspan ?? 1) - 1"
          [style.grid-row-start]="cell.rowStart ?? 1"
          [style.grid-row-end]="(cell.rowStart ?? 1) + (cell.rowspan ?? 1) - 1"
          [style.background]="cell.background ?? 'transparent'"
          [style.z-index]="cell.zIndex ?? 1"
          [style.position]="cell.position ?? 'static'"
          [style.top]="cell.top | pxPipe"
          [style.left]="cell.left | pxPipe"
          [style.right]="cell.right | pxPipe"
          [style.bottom]="cell.bottom | pxPipe"
          [style.max-height]="cell.maxHeight ? cell.maxHeight + 'px' : 'unset'"
          [style.visibility]="cell.collapsed ? 'hidden' : 'visible'"
          [style.min-height.px]="cell.row?.height"
          (click)="cell.click?.($event, cell)"
          (dblclick)="cell.dblclick?.($event, cell)"
          (mouseover)="cell.mouseover?.($event, cell)"
          (mouseout)="cell.mouseout?.($event, cell)"
          >
          <ng-container *ngTemplateOutlet="cell.template ?? defaultTemplate; context: {$implicit: cell}"></ng-container>
        </div>

        <div *ngFor="let cell of grid.items; trackBy: trackById"
          [dynamicHeight]="cell"
          [root]="getThis"
          [class]="cell.class || 'cell'"
          [style.grid-column-start]="cell.colStart ?? 1"
          [style.grid-column-end]="(cell.colStart ?? 1) + (cell.colspan ?? 1) - 1"
          [style.grid-row-start]="cell.rowStart ?? 1"
          [style.grid-row-end]="(cell.rowStart ?? 1) + (cell.rowspan ?? 1) - 1"
          [style.background]="cell.background ?? 'transparent'"
          [style.z-index]="cell.zIndex ?? 1"
          [style.position]="cell.position ?? 'static'"
          [style.top]="cell.top | pxPipe"
          [style.left]="cell.left | pxPipe"
          [style.right]="cell.right | pxPipe"
          [style.bottom]="cell.bottom | pxPipe"
          [style.max-height]="cell.maxHeight ? cell.maxHeight + 'px' : 'unset'"
          [style.visibility]="cell.collapsed ? 'hidden' : 'visible'"
          (click)="cell.click?.($event, cell)"
          (dblclick)="cell.dblclick?.($event, cell)"
          (mouseover)="cell.mouseover?.($event, cell)"
          (mouseout)="cell.mouseout?.($event, cell)"
          >
          <ng-container *ngTemplateOutlet="cell.template ?? defaultTemplate; context: {$implicit: cell}"></ng-container>

        </div>

      </div>
      <div #end class="end" [style.height.px]="data.endHeight"></div>

      {{onAfterDraw()}}
    </div>

</ng-scrollbar>

<ng-template #defaultTemplate let-cell>
  <div class="cell" [innerHTML]="cell.content | safeHtml"></div>
</ng-template>
